# .github/dependabot.yml
# Automated dependency-update PRs. Keeps the lockfiles, base images, and the
# CI actions themselves patched against newly-disclosed vulnerabilities.
version: 2
updates:
  # Python — resolves against pyproject.toml + uv.lock.
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      python-minor-patch:
        update-types: ["minor", "patch"]

  # Frontend — npm / package-lock.json.
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      npm-minor-patch:
        update-types: ["minor", "patch"]

  # GitHub Actions used by the workflows above.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  # Base images referenced by the service Dockerfiles.
  - package-ecosystem: "docker"
    directory: "/docker"
    schedule:
      interval: "weekly"
