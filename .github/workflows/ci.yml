name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff
      - name: Lint
        run: ruff check backend/
      - name: Format check
        run: ruff format --check backend/

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install mypy types-redis types-requests types-python-dateutil
      - name: Type check
        run: mypy backend/ --ignore-missing-imports --no-error-summary || true

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_USER: lumina
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: lumina_db
        ports:
          - 5435:5432
        options: >-
          --health-cmd "pg_isready -U lumina"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run tests
        env:
          DATABASE_URL: postgresql://lumina:test_password@localhost:5435/lumina_db
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: ci-test-secret-key-that-is-at-least-32-chars-long
          CELERY_BROKER_URL: redis://localhost:6379/1
          CELERY_RESULT_BACKEND: redis://localhost:6379/2
          ENVIRONMENT: development
        run: pytest tests/ -v --tb=short -m "not slow" --ignore=tests/test_integration_full.py

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -f docker/Dockerfile.api -t lumina-api:test .
      - name: Build Streamlit image
        run: docker build -f docker/Dockerfile.streamlit -t lumina-streamlit:test .
