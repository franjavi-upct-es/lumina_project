# alembic.ini
# Alembic configuration for the Lumina V3 TimescaleDB migrations.
#
# The `sqlalchemy.url` is the *default* when no env var is provided.
# At run-time we override it from `TIMESCALE_URL` in env.py so the same
# alembic.ini works on a developer laptop (Docker mapped to localhost),
# inside the migrate container (service-name DNS), and in CI.

[alembic]
script_location = alembic
sqlalchemy.url = postgresql://lumina:lumina@localhost:5432/lumina
# Strict naming so the chronological order of migrations matches their
# revision IDs. Required when teams collaborate on parallel branches.
file_template = %%(rev)s_%%(slug)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
