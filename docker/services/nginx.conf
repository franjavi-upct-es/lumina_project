# docker/services/nginx.conf
# =============================================================================
# LUMINA V3 — Nginx configuration for the React SPA container
# =============================================================================
# Responsibilities:
#   1. Serve the Vite-built static files (JS/CSS/assets) from /usr/share/nginx/html
#   2. HTML5 History API fallback: unknown paths → index.html (React Router)
#   3. Proxy /api/* → FastAPI backend (api:8000) — REST endpoints
#   4. Proxy /ws/*  → FastAPI backend (api:8000) — WebSocket connections
#      • WebSocket upgrade headers are set correctly (Upgrade, Connection)
#      • Long timeouts so agent decision feeds don't drop mid-session
#   5. Cache-control headers for SPA best practice:
#      • JS/CSS/assets: immutable (Vite content-hashes filenames)
#      • index.html:    no-cache (browser always re-validates on navigation)
#   6. Gzip compression for JS/CSS/JSON payloads
#   7. /health endpoint for Docker HEALTHCHECK
#
# Security headers are intentionally minimal here — add a Traefik/Nginx
# reverse proxy in front for TLS termination and full security hardening
# before any public deployment.
#
# Port: 3000 (non-privileged — required for non-root lumina user)
# =============================================================================

# Upstream: FastAPI backend service (resolved via Docker internal DNS)
upstream lumina_api {
    server api:8000;

    # Keepalive connections to the API reduce TCP handshake overhead
    # for the high-frequency agent decision polling and WebSocket upgrades.
    keepalive 32;
}

server {
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip compression ────────────────────────────────────────────────────
    gzip on;
    gzip_types
        application/javascript
        application/json
        text/css
        text/plain
        image/svg+xml;
    gzip_min_length 1024;
    gzip_comp_level 5;

    # ── Security headers (basic hardening) ─────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options        "DENY"    always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ── Docker HEALTHCHECK endpoint ─────────────────────────────────────────
    # Returns HTTP 200 immediately so the container health check passes
    # without hitting the API backend (which may not be ready yet).
    location = /health {
        access_log off;
        return 200 '{"status":"ok","service":"lumina-react"}';
        add_header Content-Type application/json;
    }

    # ── WebSocket proxy — /ws/* → FastAPI (api:8000) ────────────────────────
    # Handles the three live-push channels used by the React dashboard:
    #   /ws/agent  — RL agent decisions (AgentMonitor page, Zustand store)
    #   /ws/prices — real-time price ticks (DataExplorer live mode)
    #   /ws/safety — Safety Arbitrator alerts (RiskDashboard, Header badge)
    location /ws/ {
        proxy_pass         http://lumina_api;
        proxy_http_version 1.1;

        # WebSocket upgrade handshake headers
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Pass original client information to FastAPI
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Extended timeouts: agent decisions are pushed continuously.
        # 24h read timeout prevents Nginx from killing long-lived WS sessions.
        proxy_read_timeout    86400s;
        proxy_send_timeout    86400s;
        proxy_connect_timeout 10s;
    }

    # ── REST API proxy — /api/* → FastAPI (api:8000) ────────────────────────
    # The React app calls /api/v2/* (legacy) and /api/v3/* (new Chimera).
    # Proxying through Nginx avoids CORS issues in the browser (same origin).
    location /api/ {
        proxy_pass         http://lumina_api;
        proxy_http_version 1.1;

        proxy_set_header Connection        "";   # Enable keepalive to upstream
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Standard REST timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;

        # Disable buffering for streaming responses (e.g., SSE if used)
        proxy_buffering off;
    }

    # ── Static assets — JS, CSS, images (content-hashed by Vite) ──────────
    # Vite appends a content hash to every JS/CSS filename (e.g., index.Abc123.js).
    # These files are immutable — serve with 1-year cache and immutable directive.
    location ~* \.(js|css|woff2?|ttf|otf|eot|ico|png|jpg|jpeg|svg|webp|gif)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;

        # Fallback: if the hashed asset is missing, return 404 (never index.html)
        try_files $uri =404;
    }

    # ── HTML5 History API routing — all other paths → index.html ───────────
    # React Router manages client-side routing.  Any path that isn't a static
    # file or API call should return index.html so React can render the route.
    location / {
        # index.html must never be cached — the browser must re-fetch it on
        # each navigation so it picks up new JS/CSS hashes after a deploy.
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri $uri/ /index.html;
    }

    # ── Error pages ─────────────────────────────────────────────────────────
    # Redirect 404/50x to index.html so React can show its own error UI
    error_page 404              /index.html;
    error_page 500 502 503 504  /index.html;
}
