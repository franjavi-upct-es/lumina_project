# ./docker/services/timescale.conf
# =============================================================================
# LUMINA V3 - TIMESCALEDB CONFIGURATION
# =============================================================================
# PostgreSQL configuration file tuned for TimescaleDB's time-series workloads.
# This config is mounted into the TimescaleDB container at:
#   /etc/postgresql/postgresql.conf (override mount path in docker-compose)
#
# Optimization targets for Lumina V3:
#   1. High-throughput hypertable writes (OHLCV + embedding ingestion)
#   2. Fast range-scan queries on time-partitioned market data
#   3. Efficient continuous aggregates for OHLCV rollups (1m → 5m → 1h)
#   4. Background compression of historical data (chunks older than 7 days)
#   5. Concurrent access from multiple Celery workers (data + perception services)
#
# Hypertables in use (defined in timescale_setup.sql):
#   - market_data_1m      (OHLCV, chunk_interval='1 day')
#   - market_data_5m      (OHLCV, chunk_interval='7 days')
#   - market_data_1h      (OHLCV, chunk_interval='30 days')
#   - embeddings_temporal (128d TFT vectors, chunk_interval='1 hour')
#   - embeddings_semantic  (64d LLM vectors, chunk_interval='1 day')
#   - embeddings_structural(32d GNN vectors, chunk_interval='1 day')
#   - trade_log           (execution records, chunk_interval='1 day')
#   - agent_decisions     (RL action log, chunk_interval='1 day')
#
# TUNING NOTES:
# These values are calibrated for a server with 8GB RAM and 4 CPU cores.
# Adjust shared_buffers, work_mem, and effective_cache_size proportionally
# for your hardware. TimescaleDB recommends shared_buffers = 25% of total RAM.
# =============================================================================


# -----------------------------------------------------------------------------
# CONNECTIONS
# -----------------------------------------------------------------------------

# Maximum concurrent connections.
# Lumina services: api(10) + data(20) + perception(5) + brain(5) + jupyter(5) = ~45
# Plus buffer for admin and monitoring connections.
max_connections = 100


# -----------------------------------------------------------------------------
# MEMORY
# -----------------------------------------------------------------------------

# shared_buffers: PostgreSQL's internal buffer pool.
# Rule of thumb: 25% of total RAM. Set for 8GB host (2GB).
shared_buffers = 2GB

# work_mem: memory per sort/hash operation per query.
# Higher values speed up ORDER BY on time-series range scans.
# WARNING: this is per operation, not per connection — multiply by max_connections
# and parallel workers to estimate peak memory usage.
work_mem = 64MB

# maintenance_work_mem: used by VACUUM, CREATE INDEX, ALTER TABLE.
# Higher values speed up TimescaleDB chunk compression and reindex operations.
maintenance_work_mem = 512MB

# effective_cache_size: hint to the query planner about total available OS cache.
# Set to ~75% of total RAM (6GB for an 8GB machine).
effective_cache_size = 6GB

# huge_pages: attempt to use huge pages for shared_buffers (reduces TLB pressure
# on large buffer pools). Requires OS-level huge page configuration.
huge_pages = try


# -----------------------------------------------------------------------------
# WRITE-AHEAD LOG (WAL) — Critical for throughput and durability
# -----------------------------------------------------------------------------

# wal_level: minimal WAL to maximize write throughput.
# For replication, upgrade to 'replica' and configure wal_keep_size.
wal_level = replica

# synchronous_commit: 'off' allows PostgreSQL to acknowledge commits before
# WAL is flushed to disk. RISK: up to wal_writer_delay of data loss on crash.
# Acceptable for the embedding/OHLCV pipeline where data is re-computable.
# For trade_log and agent_decisions tables, consider overriding at the table level:
#   ALTER TABLE trade_log SET (synchronous_commit = on);
synchronous_commit = off

# wal_writer_delay: frequency of WAL buffer flushes (when synchronous_commit=off).
# Lower value = less potential data loss, higher value = better batch write throughput.
wal_writer_delay = 200ms

# wal_buffers: size of WAL write buffer in shared memory.
# -1 auto-selects based on shared_buffers (typically 1/32 of shared_buffers).
wal_buffers = 64MB

# checkpoint_completion_target: spread checkpoint I/O over this fraction of the
# checkpoint interval to avoid I/O spikes during bulk OHLCV ingestion.
checkpoint_completion_target = 0.9

# max_wal_size: maximum WAL to accumulate between checkpoints.
# Larger values reduce checkpoint frequency, improving throughput for bulk inserts.
max_wal_size = 4GB

# min_wal_size: prevent WAL file recycling below this threshold.
min_wal_size = 512MB


# -----------------------------------------------------------------------------
# QUERY PLANNER
# -----------------------------------------------------------------------------

# random_page_cost: cost model for random disk reads vs sequential.
# 1.1 assumes SSD storage (vs default 4.0 for HDD). Critical for hypertable queries
# that jump between time-series chunks — correct cost estimation prevents full scans.
random_page_cost = 1.1

# seq_page_cost: cost of a sequential page read (baseline = 1.0).
seq_page_cost = 1.0

# effective_io_concurrency: number of concurrent I/O requests (bitmap heap scans).
# Set to the number of SSD drives / RAID stripes (200 for modern NVMe).
effective_io_concurrency = 200

# enable_partitionwise_aggregate: critical for TimescaleDB hypertables.
# Allows the planner to push aggregations down to individual time chunks,
# enabling parallel aggregate computation across partitions.
enable_partitionwise_aggregate = on

# enable_partitionwise_join: similarly pushes join operations to chunk level.
enable_partitionwise_join = on


# -----------------------------------------------------------------------------
# PARALLELISM
# -----------------------------------------------------------------------------

# max_worker_processes: total background worker slots (TimescaleDB uses several).
# TimescaleDB background jobs (compression, reorder, retention) consume slots here.
max_worker_processes = 8

# max_parallel_workers_per_gather: workers per parallel query.
# Set to number of physical CPU cores available to the container.
max_parallel_workers_per_gather = 4

# max_parallel_workers: global parallel worker pool.
max_parallel_workers = 8

# max_parallel_maintenance_workers: for parallel CREATE INDEX and VACUUM.
max_parallel_maintenance_workers = 4


# -----------------------------------------------------------------------------
# TIMESCALEDB-SPECIFIC SETTINGS
# -----------------------------------------------------------------------------

# Load the TimescaleDB extension at startup.
# This MUST be present for hypertable management to work.
shared_preload_libraries = 'timescaledb'

# timescaledb.max_background_workers: background jobs for compression,
# continuous aggregate refresh, and data retention policies.
timescaledb.max_background_workers = 4

# telemetry: disable usage reporting for privacy
timescaledb.telemetry_level = off


# -----------------------------------------------------------------------------
# LOGGING
# -----------------------------------------------------------------------------

# Log slow queries exceeding this duration (useful for query optimization).
# Set to 500ms to catch inefficient range scans on large hypertable chunks.
log_min_duration_statement = 500

# Log connection attempts (useful for debugging service connectivity issues)
log_connections = off
log_disconnections = off

# Log format: JSON-friendly for Loguru/structured log parsing
log_line_prefix = '%t [%p] %u@%d '

# Log lock waits exceeding deadlock_timeout (helps detect contention between workers)
log_lock_waits = on

# Log level: warning — suppress routine INFO messages for cleaner log streams
log_min_messages = warning


# -----------------------------------------------------------------------------
# AUTOVACUUM
# -----------------------------------------------------------------------------

# Autovacuum is critical for TimescaleDB performance — chunks accumulate dead
# tuples from UPDATE/DELETE operations on trade logs and embedding tables.

# Enable autovacuum
autovacuum = on

# Run autovacuum more aggressively than default:
# Trigger vacuum after 5% of rows are dead (default: 20%) — important for
# high-churn embedding tables where old embeddings are overwritten frequently.
autovacuum_vacuum_scale_factor = 0.05
autovacuum_analyze_scale_factor = 0.02

# Number of autovacuum workers (must be less than max_worker_processes)
autovacuum_max_workers = 3

# Throttle autovacuum I/O to avoid competing with live OHLCV writes.
# -1 = no throttling. Tune down if I/O contention is observed.
autovacuum_vacuum_cost_delay = 2ms


# -----------------------------------------------------------------------------
# REPLICATION (Future-proofing for multi-node TimescaleDB cluster)
# -----------------------------------------------------------------------------

# Maximum standby connections (for future read replica setup)
max_wal_senders = 3

# Retain WAL for streaming replication standby
wal_keep_size = 256MB
