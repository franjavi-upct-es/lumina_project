# docker/services/timescale.conf
# TimescaleDB / PostgreSQL tuning fragment for the Lumina V3 cold store.
#
# Applied by mounting at /etc/postgresql/postgresql.conf.d/timescale.conf
# inside the official image (see docker-compose.yml). Values below are
# sized for a development laptop / single-host deployment; production
# clusters should re-tune based on RAM and disk profile.

# --- Required for TimescaleDB ---
shared_preload_libraries = 'timescaledb'

# --- Memory ---
shared_buffers = 256MB
effective_cache_size = 1GB
work_mem = 16MB
maintenance_work_mem = 128MB

# --- Write performance ---
# Default checkpoint timeout is 5min. Bumping to 15min reduces the
# checkpoint-spike pause during heavy backfills.
checkpoint_timeout = 15min
checkpoint_completion_target = 0.9
wal_buffers = 16MB

# --- Parallel query ---
# OHLCV time-bucket queries benefit from parallelism on multi-core hosts.
max_parallel_workers_per_gather = 2
max_parallel_workers = 4

# --- Connections ---
# The asyncpg pool in the API + ingestion service tops out at ~25 each;
# leave headroom for migration jobs and a manual psql session.
max_connections = 100

# --- TimescaleDB-specific ---
timescaledb.max_background_workers = 8

# --- Logging ---
log_min_duration_statement = 500ms
log_checkpoints = on
log_timezone = 'UTC'
