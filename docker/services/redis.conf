# docker/services/redis.conf
# Redis tuning for the Lumina V3 hot store.
#
# Default Redis (out-of-the-box) is fine for tiny development setups but
# wastes memory and slows the ingestion path under load. The settings
# below are derived from our actual workload characteristics:
#
#   * Working set ≈ 96 keys (32 tickers × 3 embedding modalities), each
#     384–512 bytes, plus a bounded pub/sub fan-out.
#   * Hot-path latency budget < 1 ms p99 — well below what local Redis
#     achieves but we want headroom.
#   * No durability requirement: every embedding can be recomputed from
#     TimescaleDB. We disable AOF and run a sparse RDB snapshot only for
#     restart-warm-start convenience.

# --- Memory ---
maxmemory 256mb
# When we hit the cap, evict the *least-recently-used* keys. This keeps
# the most active tickers cached even under bursty load.
maxmemory-policy allkeys-lru

# --- Persistence ---
appendonly no
save 900 1
save 300 100
# (RDB only, every 5 min if at least 100 writes — enough to recover state
# after a clean restart without paying for AOF fsync on every write.)

# --- Networking ---
tcp-backlog 511
timeout 0
tcp-keepalive 60

# --- Logging ---
loglevel notice
logfile ""

# --- Database count ---
databases 16

# --- Client-side limits (pub/sub fan-out can be large during burst news) ---
client-output-buffer-limit pubsub 32mb 8mb 60
