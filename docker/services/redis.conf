# ./docker/services/redis.conf
# =============================================================================
# LUMINA V3 - REDIS CONFIGURATION (Hot Feature Store)
# =============================================================================
# Redis serves as the "Hot Storage" layer of the Online Feature Store —
# the short-term memory of the Chimera architecture (Section 6 of the V3 doc).
#
# PRIMARY ROLE: Embedding Cache (Time-Sensitive)
#   Stores pre-computed embeddings from the Perception Service so the RL agent
#   can fetch them in microseconds at inference time (market tick frequency).
#
#   Key schema and TTL policy (from V3 constants):
#     embeddings:price:{ticker}  → 128d TFT vector   — TTL: 120 seconds
#     embeddings:news:{ticker}   → 64d  LLM vector   — TTL: 3,600 seconds (1 hour)
#     embeddings:graph:{ticker}  → 32d  GNN vector   — TTL: 7,200 seconds (2 hours)
#
#   Inference fetch pattern (The Reflex Arc):
#     MGET embeddings:price:AAPL embeddings:news:AAPL embeddings:graph:AAPL
#     → Target latency: <1ms (sub-millisecond key-value lookup)
#
# SECONDARY ROLE: Celery Task Queue Broker
#   All Celery workers (data, perception, brain) use Redis as the message broker.
#   Queue names: default | data | ingestion | streaming | perception |
#                embeddings | cognition | inference | training | backtest
#
# TERTIARY ROLE: Celery Result Backend
#   Task results and state tracking are stored in Redis with a 1-hour TTL.
#
# MEMORY STRATEGY: allkeys-lru eviction
#   When Redis reaches maxmemory, it evicts the LEAST RECENTLY USED keys first.
#   This naturally preserves fresh embeddings (recently written) and discards
#   stale ones (not updated by perception workers) — ideal for a cache-layer.
#
# =============================================================================


# -----------------------------------------------------------------------------
# NETWORK
# -----------------------------------------------------------------------------

# Bind to all interfaces inside the Docker container network.
# Security is enforced by Docker network isolation (not exposed to host by default).
bind 0.0.0.0

# Default Redis port
port 6379

# TCP backlog: number of pending connections. 511 is appropriate for high-frequency
# Celery worker connections during embedding burst ingestion.
tcp-backlog 511

# Connection timeout: close idle connections after 300 seconds (5 minutes).
# Prevents connection pool exhaustion from zombie Celery connections.
timeout 300

# TCP keepalive: send keepalives every 60 seconds to detect dead connections.
tcp-keepalive 60


# -----------------------------------------------------------------------------
# GENERAL
# -----------------------------------------------------------------------------

# Daemonize: NO — Redis must run in the foreground for Docker container lifecycle.
# Docker expects the process to stay in the foreground (PID 1 behavior).
daemonize no

# Process ID file (not required for Docker but included for completeness)
pidfile /var/run/redis_6379.pid

# Log level: notice = production-appropriate verbosity
# Options: debug | verbose | notice | warning
loglevel notice

# Log to stdout (Docker captures stdout for log aggregation)
logfile ""

# Number of databases: 4 (db0=default/Celery broker, db1=embeddings cache,
# db2=result backend, db3=deduplication bloom filter)
databases 4


# -----------------------------------------------------------------------------
# MEMORY MANAGEMENT
# -----------------------------------------------------------------------------

# Maximum memory allocation for Redis.
# Reserve headroom for OS and other processes: on a 4GB container, use 2.5GB.
# Tune this based on: (num_tickers × 3 embeddings × avg_vector_bytes) + Celery overhead
# Example: 500 tickers × (512 + 256 + 128) bytes × 2x safety = ~900MB for embeddings
maxmemory 2500mb

# Eviction policy: when maxmemory is reached, evict the LRU (Least Recently Used) key
# from the ENTIRE keyspace. This ensures stale/old embeddings are evicted before
# fresh ones, maintaining a "hot" cache of actively traded assets.
maxmemory-policy allkeys-lru

# LRU / LFU sample size: number of keys sampled per eviction cycle.
# Higher = more accurate LRU approximation, slightly more CPU overhead.
# 10 is a good balance (Redis default is 5).
maxmemory-samples 10

# Lazy free: perform DEL, FLUSHDB, FLUSHALL asynchronously in a background thread.
# Prevents blocking the main event loop when evicting large embedding vectors.
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes
replica-lazy-flush yes


# -----------------------------------------------------------------------------
# PERSISTENCE (Selective — Cache layer does not require full durability)
# -----------------------------------------------------------------------------

# RDB (snapshotting): create a point-in-time dump for fast restart recovery.
# Less critical for embeddings (re-computable), but useful for Celery queue state.
# Format: save <seconds> <minimum_changes>
save 900 1      # Save if at least 1 key changed in 15 minutes
save 300 10     # Save if at least 10 keys changed in 5 minutes
save 60 1000    # Save if at least 1000 keys changed in 1 minute

# Disable saving if RDB snapshot fails (prevents data loss on I/O errors)
stop-writes-on-bgsave-error yes

# Compress RDB snapshots using LZF compression (reduces dump file size ~50%)
rdbcompression yes

# RDB checksum: adds 10% performance cost on save/load but ensures data integrity
rdbchecksum yes

# RDB filename and directory
dbfilename lumina_v3_redis_dump.rdb
dir /data

# AOF (Append Only File): DISABLED for the embedding cache layer.
# Embeddings are ephemeral and re-computed by the Perception Service.
# Enabling AOF would create unnecessary I/O overhead for TTL-heavy workloads.
appendonly no

# If AOF is ever enabled in the future, use this fsync policy:
# appendfsync everysec   # fsync every second — balanced throughput vs durability


# -----------------------------------------------------------------------------
# KEY EXPIRATION (TTL enforcement)
# -----------------------------------------------------------------------------

# Active expiry: Redis checks a random sample of keys with TTLs every second
# and deletes expired ones. hz controls how often this runs (in Hz = cycles/sec).
# Higher hz = more aggressive expiry cleanup, higher CPU baseline.
# 20 is recommended for TTL-heavy workloads (embedding cache with short 120s TTLs).
hz 20

# Dynamic hz: allows Redis to increase hz during high activity bursts
dynamic-hz yes


# -----------------------------------------------------------------------------
# THREADING (Redis 6+ I/O Threads)
# -----------------------------------------------------------------------------

# Enable multi-threaded I/O for read/write operations.
# The Redis event loop remains single-threaded; only network I/O is parallelized.
# Use (CPU cores - 1) threads; 3 threads for a 4-core container.
io-threads 3
io-threads-do-reads yes


# -----------------------------------------------------------------------------
# SLOW LOG (Performance monitoring)
# -----------------------------------------------------------------------------

# Log queries slower than this threshold (in microseconds).
# 10ms = 10,000 microseconds. Flag any operation slower than 10ms for investigation.
# The Reflex Arc target is <1ms; 10ms threshold catches pathological queries.
slowlog-log-slower-than 10000

# Maximum entries in the slow log (circular buffer)
slowlog-max-len 128


# -----------------------------------------------------------------------------
# SECURITY
# -----------------------------------------------------------------------------

# Password authentication: set via REDIS_PASSWORD env variable injected at runtime.
# Docker secret or .env file should provide this value.
# requirepass is set via command-line in docker-compose (--requirepass ${REDIS_PASSWORD})
# to avoid storing the password in this config file in plaintext.

# Disable dangerous commands that could wipe the embedding cache in production.
# FLUSHALL and FLUSHDB are blocked; use targeted DEL for cache invalidation.
rename-command FLUSHALL "LUMINA_FLUSHALL_DISABLED"
rename-command FLUSHDB  "LUMINA_FLUSHDB_DISABLED"
rename-command DEBUG    ""
rename-command CONFIG   "LUMINA_CONFIG_RESTRICTED"


# -----------------------------------------------------------------------------
# CLIENT MANAGEMENT
# -----------------------------------------------------------------------------

# Maximum number of simultaneous client connections.
# Lumina services: api(10) + data(40) + perception(10) + brain(5) + celery_beat(2) = ~67
# Plus monitoring (Flower, health checks) → 100 total is safe.
maxclients 100

# Output buffer limits for client connections.
# Prevent slow consumers from consuming unbounded memory (important for Celery result
# subscribers that may lag behind producer workers during training bursts).
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit pubsub 32mb 8mb 60
client-output-buffer-limit replica 256mb 64mb 60
