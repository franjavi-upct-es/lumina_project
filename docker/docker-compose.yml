# docker/docker-compose.yml
# =============================================================================
# LUMINA V3 - FULL STACK ORCHESTRATION (docker-compose.yml)
# =============================================================================
# Migration: 🔧 MODIFY — Streamlit frontend replaced by React SPA
#   Old: streamlit service (Python, port 8501, polling)
#   New: react service    (Nginx + Vite bundle, port 3000, WebSocket push)
#
# Orchestrates all services of the Chimera architecture:
#
# INFRASTRUCTURE LAYER:
#   timescaledb    — Time-series database (Cold Feature Store + MLflow metadata)
#   redis          — Hot Feature Store + Celery broker/backend
#
# APPLICATION LAYER:
#   api            — FastAPI backend (REST endpoints, monitoring, risk routes)
#   react          — React 18 SPA dashboard (Nginx, port 3000) ← NEW
#   mlflow         — Experiment tracking (Spartan Training Curriculum runs)
#   flower         — Celery task queue monitoring UI
#
# INTELLIGENCE LAYER:
#   data           — Data collection workers (OHLCV, news, social, on-chain)
#   perception     — Encoding workers (TFT=128d, LLM=64d, GNN=32d) [GPU]
#   brain          — RL agent (Fusion + PPO/SAC + Uncertainty Gate) [GPU]
#   jupyter        — Research lab (notebooks, experiments, visualization) [GPU]
#
# SCHEDULER:
#   celery-beat    — Periodic task scheduler (minutely TFT, hourly GNN, etc.)
#
# PROFILES:
#   (default)      — All services above start automatically
#   legacy         — Starts the deprecated Streamlit dashboard (port 8501)
#                    Use only for A/B comparison during migration period.
#                    docker-compose --profile legacy up streamlit
#   research       — Starts Jupyter Lab (GPU, port 8888)
#                    docker-compose --profile research up jupyter
#
# NETWORKING:
#   lumina-backend  — Internal service mesh (no external access)
#   lumina-frontend — Public-facing ports (api, react, mlflow, flower)
#
# VOLUMES:
#   timescale-data     — Persistent database storage
#   redis-data         — RDB snapshots and AOF (if enabled)
#   mlflow-artifacts   — Model checkpoints and run artifacts
#   brain-checkpoints  — RL agent policy network weights
#   jupyter-work       — Research scratch space
#   hf-cache           — Hugging Face model weights (shared perception + brain)
#
# =============================================================================

version: "3.9"

# =============================================================================
# SHARED CONFIGURATION ANCHORS (YAML anchors — avoids repetition)
# =============================================================================

# Common environment variables injected into every service that communicates
# with TimescaleDB, Redis, or the Celery queue.
x-common-env: &common-env # TimescaleDB connection
  DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@timescaledb:5432/${POSTGRES_DB}"
  DATABASE_URL_SYNC: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@timescaledb:5432/${POSTGRES_DB}"
  # Redis connection (used for feature store + Celery)
  REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379/0"
  CELERY_BROKER_URL: "redis://:${REDIS_PASSWORD}@redis:6379/0"
  CELERY_RESULT_BACKEND: "redis://:${REDIS_PASSWORD}@redis:6379/2"
  # Feature Store Redis database (db1 = embedding cache)
  FEATURE_STORE_REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379/1"
  # MLflow tracking
  MLFLOW_TRACKING_URI: "http://mlflow:5000"
  # V3 architecture constants (matches backend/config/constants.py)
  EMBEDDING_DIM_TEMPORAL: "128"
  EMBEDDING_DIM_SEMANTIC: "64"
  EMBEDDING_DIM_STRUCTURAL: "32"
  SUPER_STATE_DIM: "224"
  UNCERTAINTY_CRITICAL: "0.8"
  MAX_DRAWDOWN_LIMIT: "0.10"
  DAILY_LOSS_LIMIT: "0.03"
  PROFIT_TARGET: "0.20"
  # Redis TTLs for embedding cache
  REDIS_TTL_PRICE: "120"
  REDIS_TTL_NEWS: "3600"
  REDIS_TTL_GRAPH: "7200"
  # Logging
  LOG_LEVEL: "${LOG_LEVEL:-INFO}"
  ENVIRONMENT: "${ENVIRONMENT:-development}"

# Health check dependency policy: service waits until dependency is healthy
x-depends-infra: &depends-infra
  timescaledb:
    condition: service_healthy
  redis:
    condition: service_healthy

# GPU resource reservation for CUDA-capable services
x-gpu-resources: &gpu-resources
  reservations:
    devices:
      - driver: nvidia
        count: 1
        capabilities: [gpu]

# Restart policy for production resilience
x-restart-policy: &restart-policy
  restart: unless-stopped

# =============================================================================
# SERVICES
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # INFRASTRUCTURE: TIMESCALEDB
  # ---------------------------------------------------------------------------
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: lumina_timescaledb
    <<: *restart-policy
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      # Enable TimescaleDB extension automatically on DB creation
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=en_US.UTF-8"
    volumes:
      # Persistent data volume — NEVER delete this in production
      - timescale-data:/home/postgres/pgdata/data
      # Custom PostgreSQL configuration tuned for time-series workloads
      - ./services/timescale.conf:/etc/postgresql.conf:ro
      # Initialization scripts run on first container start (alphabetical order)
      - ../backend/db/timescale_setup.sql:/docker-entrypoint-initdb.d/01_timescale_setup.sql:ro
      - ../backend/db/00_create_mlflow_db.sh:/docker-entrypoint-initdb.d/00_create_mlflow_db.sh:ro
    command: postgres -c config_file=/etc/postgresql.conf
    ports:
      # Expose TimescaleDB port to localhost ONLY (for DBeaver/pgAdmin access during dev)
      - "127.0.0.1:5432:5432"
    networks:
      - lumina-backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ---------------------------------------------------------------------------
  # INFRASTRUCTURE: REDIS (Hot Feature Store + Celery Broker)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7.4-alpine
    container_name: lumina_redis
    <<: *restart-policy
    volumes:
      # Custom Redis config (embedding cache optimization, LRU policy, security)
      - ./services/redis.conf:/usr/local/etc/redis/redis.conf:ro
      # Persistent RDB snapshot volume
      - redis-data:/data
    command: >
      redis-server /usr/local/etc/redis/redis.conf
      --requirepass ${REDIS_PASSWORD}
    ports:
      # Expose Redis port to localhost ONLY for debugging (RedisInsight, redis-cli)
      - "127.0.0.1:6379:6379"
    networks:
      - lumina-backend
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # APPLICATION: FASTAPI BACKEND
  # ---------------------------------------------------------------------------
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    image: lumina-v3-api:latest
    container_name: lumina_api
    <<: *restart-policy
    environment:
      <<: *common-env
      # API-specific settings
      API_SECRET_KEY: ${API_SECRET_KEY}
      ALPACA_API_KEY: ${ALPACA_API_KEY}
      ALPACA_SECRET_KEY: ${ALPACA_SECRET_KEY}
      ALPACA_BASE_URL: ${ALPACA_BASE_URL:-https://paper-api.alpaca.markets}
      ALPHA_VANTAGE_API_KEY: ${ALPHA_VANTAGE_API_KEY}
      FRED_API_KEY: ${FRED_API_KEY}
    depends_on:
      <<: *depends-infra
    ports:
      - "8000:8000"
    networks:
      - lumina-backend
      - lumina-frontend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ---------------------------------------------------------------------------
  # APPLICATION: REACT DASHBOARD  (replaces Streamlit — 📁 RENAME + 🔧 MODIFY)
  # ---------------------------------------------------------------------------
  # Vite-built React 18 SPA served by Nginx on port 3000.
  # Nginx proxies /api/* and /ws/* to api:8000 over the internal Docker network
  # so the browser only communicates with one origin (no CORS needed).
  #
  # Build args (VITE_* prefix) are baked into the JS bundle at build time.
  # To change the API URL after build, rebuild the image — do not use env vars.
  #
  # WebSocket channels proxied through Nginx (/ws/ location in nginx.conf):
  #   /ws/agent  → AgentMonitor live decision feed (Zustand useAgentStore)
  #   /ws/prices → DataExplorer real-time price ticks
  #   /ws/safety → RiskDashboard Safety Arbitrator alerts
  # ---------------------------------------------------------------------------
  react:
    build:
      context: ..
      dockerfile: docker/Dockerfile.react
      args:
        # VITE_API_URL / VITE_WS_URL are the URLs the BROWSER uses.
        # With Nginx proxying on the same port (3000), both point to localhost:3000.
        # Override in .env for production deployments behind a real domain.
        VITE_API_URL: "${VITE_API_URL:-http://localhost:3000}"
        VITE_WS_URL: "${VITE_WS_URL:-ws://localhost:3000}"
        VITE_APP_VERSION: "3.0.0"
        VITE_ENVIRONMENT: "${ENVIRONMENT:-development}"
    image: lumina-v3-react:latest
    container_name: lumina_react
    <<: *restart-policy
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3000:3000"
    volumes:
      # Mount nginx.conf read-only — change Nginx config without rebuilding image.
      # Remove this volume mount in production and bake config into the image.
      - ./services/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - lumina-frontend # Port 3000 exposed to host
      - lumina-backend # Nginx upstream api:8000 resolved via internal DNS
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ---------------------------------------------------------------------------
  # APPLICATION: STREAMLIT DASHBOARD  (📦 legacy profile — migration period)
  # ---------------------------------------------------------------------------
  # Kept under the `legacy` profile for A/B validation during the transition.
  # Does NOT start with the default `docker-compose up`.
  # Start explicitly when needed:
  #   docker-compose --profile legacy up streamlit
  # Archive this service once the React dashboard passes validation.
  # ---------------------------------------------------------------------------
  streamlit:
    build:
      context: ..
      dockerfile: docker/Dockerfile.streamlit
    image: lumina-v3-streamlit:latest
    container_name: lumina_streamlit
    <<: *restart-policy
    profiles:
      - legacy
    environment:
      <<: *common-env
      API_BASE_URL: "http://api:8000"
    depends_on:
      api:
        condition: service_healthy
    ports:
      # Port 8501 kept unchanged — no conflict with React on 3000
      - "8501:8501"
    networks:
      - lumina-frontend
      - lumina-backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 25s

  # ---------------------------------------------------------------------------
  # APPLICATION: MLFLOW EXPERIMENT TRACKING
  # ---------------------------------------------------------------------------
  mlflow:
    build:
      context: ..
      dockerfile: docker/Dockerfile.mlflow
    image: lumina-v3-mlflow:latest
    container_name: lumina_mlflow
    <<: *restart-policy
    environment:
      # MLflow uses TimescaleDB's dedicated mlflow database
      MLFLOW_BACKEND_STORE_URI: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@timescaledb:5432/mlflow"
    depends_on:
      timescaledb:
        condition: service_healthy
    volumes:
      - mlflow-artifacts:/mlflow/artifacts
    ports:
      - "5000:5000"
    networks:
      - lumina-backend
      - lumina-frontend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 25s

  # ---------------------------------------------------------------------------
  # SCHEDULER: CELERY BEAT (Periodic Task Scheduler)
  # ---------------------------------------------------------------------------
  celery-beat:
    build:
      context: ..
      dockerfile: docker/Dockerfile.data
    image: lumina-v3-data:latest
    container_name: lumina_celery_beat
    <<: *restart-policy
    environment:
      <<: *common-env
      ALPHA_VANTAGE_API_KEY: ${ALPHA_VANTAGE_API_KEY}
      FRED_API_KEY: ${FRED_API_KEY}
      NEWS_API_KEY: ${NEWS_API_KEY}
    depends_on:
      <<: *depends-infra
    volumes:
      - ../backend:/app/backend:ro
    networks:
      - lumina-backend
    # Celery Beat runs the scheduler, not a worker
    # It schedules tasks onto Redis queues at defined intervals:
    #   - Every 1 min:  TFT price embedding update (embeddings:price:*)
    #   - Every 1 hour: GNN graph embedding update (embeddings:graph:*)
    #   - On event:     LLM news embedding (event-driven via news_stream.py)
    command: >
      celery -A backend.workers.celery_app beat
      --loglevel=info
      --scheduler=celery.beat:PersistentScheduler
      --schedule=/tmp/celerybeat-schedule

  # ---------------------------------------------------------------------------
  # INTELLIGENCE: DATA ENGINE WORKERS
  # ---------------------------------------------------------------------------
  data:
    build:
      context: ..
      dockerfile: docker/Dockerfile.data
    image: lumina-v3-data:latest
    container_name: lumina_data
    <<: *restart-policy
    environment:
      <<: *common-env
      ALPHA_VANTAGE_API_KEY: ${ALPHA_VANTAGE_API_KEY}
      YFINANCE_ENABLED: "true"
      FRED_API_KEY: ${FRED_API_KEY}
      NEWS_API_KEY: ${NEWS_API_KEY}
      REDDIT_CLIENT_ID: ${REDDIT_CLIENT_ID}
      REDDIT_CLIENT_SECRET: ${REDDIT_CLIENT_SECRET}
      TWITTER_BEARER_TOKEN: ${TWITTER_BEARER_TOKEN}
    depends_on:
      <<: *depends-infra
    volumes:
      # Local parquet cache for fast data replay during backtesting
      - ../data/parquet:/app/data/parquet
    networks:
      - lumina-backend
    # Scale data workers horizontally: `docker-compose up --scale data=3`
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "2.0"
          memory: 2G

  # ---------------------------------------------------------------------------
  # INTELLIGENCE: PERCEPTION ENCODING SERVICE (GPU)
  # ---------------------------------------------------------------------------
  perception:
    build:
      context: ..
      dockerfile: docker/Dockerfile.perception
    image: lumina-v3-perception:latest
    container_name: lumina_perception
    <<: *restart-policy
    environment:
      <<: *common-env
      # GPU device selection (override for multi-GPU setups)
      CUDA_VISIBLE_DEVICES: "${CUDA_VISIBLE_DEVICES:-0}"
      # Hugging Face model identifiers (resolved at first run, cached to hf-cache volume)
      TFT_MODEL_PATH: "${TFT_MODEL_PATH:-/app/checkpoints/tft_encoder}"
      NLP_MODEL_NAME: "${NLP_MODEL_NAME:-yiyanghkust/finbert-tone}"
      GNN_MODEL_PATH: "${GNN_MODEL_PATH:-/app/checkpoints/gnn_encoder}"
    depends_on:
      <<: *depends-infra
    volumes:
      # Shared Hugging Face model cache (avoids re-downloading 100GB+ of weights)
      - hf-cache:/app/.cache/huggingface
      - brain-checkpoints:/app/checkpoints
    networks:
      - lumina-backend
    runtime: nvidia
    deploy:
      resources:
        <<: *gpu-resources
        limits:
          cpus: "4.0"
          memory: 8G

  # ---------------------------------------------------------------------------
  # INTELLIGENCE: RL BRAIN / COGNITION SERVICE (GPU)
  # ---------------------------------------------------------------------------
  brain:
    build:
      context: ..
      dockerfile: docker/Dockerfile.brain
    image: lumina-v3-brain:latest
    container_name: lumina_brain
    <<: *restart-policy
    environment:
      <<: *common-env
      CUDA_VISIBLE_DEVICES: "${CUDA_VISIBLE_DEVICES:-0}"
      ALPACA_API_KEY: ${ALPACA_API_KEY}
      ALPACA_SECRET_KEY: ${ALPACA_SECRET_KEY}
      ALPACA_BASE_URL: ${ALPACA_BASE_URL:-https://paper-api.alpaca.markets}
      # RL training settings
      TRAINING_CURRICULUM_PHASE: "${TRAINING_CURRICULUM_PHASE:-inference}"
      PPO_LEARNING_RATE: "${PPO_LEARNING_RATE:-3e-4}"
      SAC_LEARNING_RATE: "${SAC_LEARNING_RATE:-1e-4}"
      # Safety system thresholds (non-negotiable hard constraints)
      UNCERTAINTY_CRITICAL: "0.8"
      MAX_DRAWDOWN_LIMIT: "0.10"
      DAILY_LOSS_LIMIT: "0.03"
      PROFIT_TARGET: "0.20"
    depends_on:
      <<: *depends-infra
      perception:
        condition: service_started
    volumes:
      - brain-checkpoints:/app/checkpoints
      - hf-cache:/app/.cache/huggingface
      - ../logs:/app/logs
    ports:
      # Internal health/monitoring endpoint for the brain service
      - "127.0.0.1:8003:8003"
    networks:
      - lumina-backend
    runtime: nvidia
    deploy:
      resources:
        <<: *gpu-resources
        limits:
          cpus: "4.0"
          memory: 16G

  # ---------------------------------------------------------------------------
  # MONITORING: FLOWER (Celery Task Queue UI)
  # ---------------------------------------------------------------------------
  flower:
    image: mher/flower:2.0
    container_name: lumina_flower
    <<: *restart-policy
    environment:
      CELERY_BROKER_URL: "redis://:${REDIS_PASSWORD}@redis:6379/0"
      CELERY_RESULT_BACKEND: "redis://:${REDIS_PASSWORD}@redis:6379/2"
      FLOWER_BASIC_AUTH: "${FLOWER_USER:-admin}:${FLOWER_PASSWORD:-lumina}"
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "5555:5555"
    networks:
      - lumina-backend
      - lumina-frontend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5555/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ---------------------------------------------------------------------------
  # RESEARCH: JUPYTER LAB (GPU — development/research only)
  # ---------------------------------------------------------------------------
  jupyter:
    build:
      context: ..
      dockerfile: docker/Dockerfile.jupyter
    image: lumina-v3-jupyter:latest
    container_name: lumina_jupyter
    # Do NOT restart Jupyter automatically — researcher manages lifecycle manually
    restart: "no"
    environment:
      <<: *common-env
      CUDA_VISIBLE_DEVICES: "${CUDA_VISIBLE_DEVICES:-0}"
      JUPYTER_TOKEN: "${JUPYTER_TOKEN:-lumina_research_token_change_me}"
      ALPACA_API_KEY: ${ALPACA_API_KEY}
      ALPHA_VANTAGE_API_KEY: ${ALPHA_VANTAGE_API_KEY}
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      # Mount notebooks directory for live editing persistence
      - ../notebooks:/app/notebooks
      # Full backend access for importing modules in notebooks
      - ../backend:/app/backend:ro
      - hf-cache:/app/.cache/huggingface
      - brain-checkpoints:/app/checkpoints
      # Jupyter work directory
      - jupyter-work:/app/work
    ports:
      # Expose Jupyter ONLY to localhost — never to 0.0.0.0 in production
      - "127.0.0.1:8888:8888"
    networks:
      - lumina-backend
    runtime: nvidia
    profiles:
      # Jupyter only starts when explicitly requested:
      # docker-compose --profile research up jupyter
      - research
    deploy:
      resources:
        <<: *gpu-resources
        limits:
          cpus: "4.0"
          memory: 16G

# =============================================================================
# NETWORKS
# =============================================================================

networks:
  # Internal service mesh: all backend services communicate here.
  # Not exposed externally — services communicate by container name.
  lumina-backend:
    driver: bridge
    name: lumina_backend_net
    ipam:
      config:
        - subnet: 172.20.0.0/16

  # External-facing network: only services with public ports join this.
  # Enables future addition of an Nginx/Traefik reverse proxy as a gateway.
  lumina-frontend:
    driver: bridge
    name: lumina_frontend_net

# =============================================================================
# VOLUMES
# =============================================================================

volumes:
  # TimescaleDB data: ALL hypertables, continuous aggregates, and compression chunks
  timescale-data:
    driver: local
    name: lumina_timescale_data

  # Redis RDB snapshots
  redis-data:
    driver: local
    name: lumina_redis_data

  # MLflow artifacts: model checkpoints, confusion matrices, t-SNE visualizations,
  # attention weight plots saved during the Spartan Training Curriculum
  mlflow-artifacts:
    driver: local
    name: lumina_mlflow_artifacts

  # RL agent checkpoints: PPO/SAC policy networks, value function weights,
  # TFT encoder weights, GNN encoder weights, LLM vectorizer weights
  brain-checkpoints:
    driver: local
    name: lumina_brain_checkpoints

  # Jupyter work directory: scratch space for ad-hoc research
  jupyter-work:
    driver: local
    name: lumina_jupyter_work

  # Hugging Face model cache: shared between perception and jupyter services
  # to avoid downloading DistilRoBERTa weights multiple times (multi-GB)
  hf-cache:
    driver: local
    name: lumina_hf_model_cache
