# .pre-commit-config.yaml
# Pre-commit hooks for code quality
# Install: pre-commit install
# Run manually: pre-commit run --all-files

---
default_language_version:
  python: python3.11

repos:
  # ========== General Checks ==========
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      # File formatting
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=1000]

      # Python checks
      - id: check-ast
      - id: check-builtin-literals
      - id: check-docstring-first
      - id: debug-statements
      - id: name-tests-test
        args: [--pytest-test-first]

      # Git checks
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: mixed-line-ending
        args: [--fix=lf]

      # Security
      - id: detect-private-key

  # ========== Python Code Formatting ==========
  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        language_version: python3.11
        args: [--line-length=79]

  # ========== Import Sorting ==========
  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: [--profile=black, --line-length=79]

  # ========== Linting ==========
  - repo: https://github.com/pycqa/flake8
    rev: 7.1.1
    hooks:
      - id: flake8
        args:
          - --max-line-length=79
          - --extend-ignore=E203,W503,D100,D101,D102,D103,D104,D105,D106,D107,D200,D202,D205,D400,D401,D403,B008,E402
        exclude: ^(\.git|__pycache__|\.venv|build|dist)/
        additional_dependencies:
          - flake8-docstrings
          - flake8-bugbear

  # ========== Type Checking ==========
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.2
    hooks:
      - id: mypy
        args: [--ignore-missing-imports, --no-strict-optional]
        additional_dependencies:
          - types-requests
          - types-PyYAML

  # ========== Security ==========
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.10
    hooks:
      - id: bandit
        args:
          - -ll
        exclude: ^tests/

  # ========== Docstring Coverage ==========
  - repo: https://github.com/econchick/interrogate
    rev: 1.7.0
    hooks:
      - id: interrogate
        args:
          [
            --verbose,
            --fail-under=50,
            --ignore-init-method,
            --ignore-init-module,
            --ignore-magic,
            --ignore-private,
            --exclude=tests,
          ]

  # ========== Markdown ==========
  - repo: https://github.com/markdownlint/markdownlint
    rev: v0.12.0
    hooks:
      - id: markdownlint

  # ========== YAML ==========
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args:
          - -d
          - "{extends: default, rules: {line-length: {max: 120}, document-start: disable, truthy: disable}}"

  # ========== Jupyter Notebooks ==========
  - repo: https://github.com/nbQA-dev/nbQA
    rev: 1.8.7
    hooks:
      - id: nbqa-black
      - id: nbqa-isort
      - id: nbqa-flake8

  # ========== Secrets Detection ==========
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: [--baseline, .secrets.baseline]

# ========== CI Skip ==========
# Skip certain hooks in CI if needed
ci:
  skip: [mypy, interrogate]
