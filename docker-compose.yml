# docker-compose.yml
# Lumina V3 — local-development service composition.
#
# Audit-driven changes
# --------------------
# Finding 2.2: the Cross-Modal Attention Nexus consumes embeddings from
# THREE perception modalities simultaneously. The previous file only ran
# a single perception container in `tft_inference` mode, making the
# 224-d super-state impossible to assemble. We now ship one container
# per modality (perception_tft / perception_semantic / perception_graph)
# and they write to disjoint Redis keys via their respective
# LUMINA_SERVICE_MODE values.
#
# GPU reservations live in `docker-compose.gpu-8gb.yml` so the default
# composition can start on CPU-only developer machines. Use the override as:
#     docker compose -f docker-compose.yml -f docker-compose.gpu-8gb.yml up

services:
  # ----- Storage -----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: lumina_redis
    restart: unless-stopped
    command: ["redis-server", "/etc/redis/redis.conf"]
    volumes:
      - redis_data:/data
      - ./docker/services/redis.conf:/etc/redis/redis.conf:ro
    ports:
      - "6379:6379"
    networks: [lumina_net]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  timescale:
    image: timescale/timescaledb:latest-pg16
    container_name: lumina_timescale
    restart: unless-stopped
    environment:
      POSTGRES_USER: lumina
      POSTGRES_PASSWORD: lumina
      POSTGRES_DB: lumina
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./docker/services/timescale.conf:/etc/postgresql/postgresql.conf.d/timescale.conf:ro
    ports:
      - "5432:5432"
    networks: [lumina_net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lumina -d lumina"]
      interval: 5s
      timeout: 3s
      retries: 10

  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: lumina_mlflow
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    command: >
      mlflow server
      --backend-store-uri sqlite:///mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
      --host 0.0.0.0
      --port 5000
    networks: [lumina_net]

  # ----- One-shot migration ------------------------------------------------
  migrate:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: lumina_migrate
    restart: "no"
    environment:
      LUMINA_SERVICE_MODE: migrate
    env_file: [.env]
    depends_on:
      timescale: { condition: service_healthy }
    networks: [lumina_net]

  # ----- API ---------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: lumina_api
    restart: unless-stopped
    environment:
      LUMINA_SERVICE_MODE: api
    env_file: [.env]
    ports:
      - "8000:8000"
    depends_on:
      redis:     { condition: service_healthy }
      timescale: { condition: service_healthy }
      migrate:   { condition: service_completed_successfully }
    networks: [lumina_net]

  # ----- Data engine -------------------------------------------------------
  data:
    profiles: ["trading"]
    build:
      context: .
      dockerfile: docker/Dockerfile.data
    container_name: lumina_data
    restart: unless-stopped
    environment:
      LUMINA_SERVICE_MODE: ingestion
    env_file: [.env]
    depends_on:
      redis:     { condition: service_healthy }
      timescale: { condition: service_healthy }
      migrate:   { condition: service_completed_successfully }
    networks: [lumina_net]

  price_stream:
    profiles: ["real-feed"]
    build:
      context: .
      dockerfile: docker/Dockerfile.data
    container_name: lumina_price_stream
    restart: unless-stopped
    environment:
      LUMINA_SERVICE_MODE: price_stream
    env_file: [.env]
    depends_on:
      redis: { condition: service_healthy }
    networks: [lumina_net]

  news_collector:
    profiles: ["real-feed"]
    build:
      context: .
      dockerfile: docker/Dockerfile.data
    container_name: lumina_news_collector
    restart: unless-stopped
    environment:
      LUMINA_SERVICE_MODE: news_collector
    env_file: [.env]
    depends_on:
      redis: { condition: service_healthy }
    networks: [lumina_net]

  synthetic_feed:
    profiles: ["synthetic-feed"]
    build:
      context: .
      dockerfile: docker/Dockerfile.data
    container_name: lumina_synthetic_feed
    restart: unless-stopped
    environment:
      LUMINA_SERVICE_MODE: synthetic_feed
      ALLOW_RANDOM_MODELS: "true"
    env_file: [.env]
    depends_on:
      redis:     { condition: service_healthy }
      timescale: { condition: service_healthy }
      migrate:   { condition: service_completed_successfully }
    networks: [lumina_net]

  # ----- Perception layer (3 modalities, one container each) ----------------
  # Each container subscribes to Redis pub/sub channels for its inputs
  # and publishes its embedding to a modality-specific Redis key. The
  # State Assembler (running inside `brain`) reads all three.
  perception_tft:
    profiles: ["trading"]
    build:
      context: .
      dockerfile: docker/Dockerfile.perception
    container_name: lumina_perception_tft
    restart: unless-stopped
    environment:
      LUMINA_SERVICE_MODE: tft_inference
    env_file: [.env]
    depends_on:
      redis:     { condition: service_healthy }
      timescale: { condition: service_healthy }
    volumes:
      - ./models:/app/models:ro
    networks: [lumina_net]

  perception_semantic:
    profiles: ["trading"]
    build:
      context: .
      dockerfile: docker/Dockerfile.perception
    container_name: lumina_perception_semantic
    restart: unless-stopped
    environment:
      LUMINA_SERVICE_MODE: semantic_inference
    env_file: [.env]
    depends_on:
      redis:     { condition: service_healthy }
      timescale: { condition: service_healthy }
    volumes:
      - ./models:/app/models:ro
    networks: [lumina_net]

  perception_graph:
    profiles: ["trading"]
    build:
      context: .
      dockerfile: docker/Dockerfile.perception
    container_name: lumina_perception_graph
    restart: unless-stopped
    environment:
      LUMINA_SERVICE_MODE: graph_inference
    env_file: [.env]
    depends_on:
      redis:     { condition: service_healthy }
      timescale: { condition: service_healthy }
    volumes:
      - ./models:/app/models:ro
    networks: [lumina_net]

  # ----- Fusion state assembler ---------------------------------------------
  state_assembler:
    profiles: ["trading"]
    image: ${BRAIN_IMAGE:-lumina/brain:latest}
    build:
      context: .
      dockerfile: docker/Dockerfile.brain
    container_name: lumina_state_assembler
    restart: unless-stopped
    environment:
      LUMINA_SERVICE_MODE: state_assembler
    env_file: [.env]
    depends_on:
      redis:               { condition: service_healthy }
      timescale:           { condition: service_healthy }
      api:                 { condition: service_started }
      perception_tft:      { condition: service_started }
      perception_semantic: { condition: service_started }
      perception_graph:    { condition: service_started }
    volumes:
      - ./models:/app/models:ro
      - ./artifacts:/app/artifacts
    networks: [lumina_net]

  agent_loop:
    profiles: ["trading"]
    image: ${BRAIN_IMAGE:-lumina/brain:latest}
    build:
      context: .
      dockerfile: docker/Dockerfile.brain
    container_name: lumina_agent_loop
    restart: unless-stopped
    environment:
      LUMINA_SERVICE_MODE: agent_loop
    env_file: [.env]
    depends_on:
      redis:            { condition: service_healthy }
      timescale:        { condition: service_healthy }
      state_assembler:  { condition: service_started }
    volumes:
      - ./models:/app/models:ro
      - ./artifacts:/app/artifacts
    networks: [lumina_net]

  # ----- Dashboard-triggered simulation workers ----------------------------
  backtest_worker:
    image: ${BRAIN_IMAGE:-lumina/brain:latest}
    build:
      context: .
      dockerfile: docker/Dockerfile.brain
    container_name: lumina_backtest_worker
    restart: unless-stopped
    environment:
      LUMINA_SERVICE_MODE: backtest_worker
    env_file: [.env]
    depends_on:
      redis:     { condition: service_healthy }
      timescale: { condition: service_healthy }
      migrate:   { condition: service_completed_successfully }
      mlflow:    { condition: service_started }
    volumes:
      - ./models:/app/models:ro
    networks: [lumina_net]

  arena_worker:
    image: ${BRAIN_IMAGE:-lumina/brain:latest}
    build:
      context: .
      dockerfile: docker/Dockerfile.brain
    container_name: lumina_arena_worker
    restart: unless-stopped
    environment:
      LUMINA_SERVICE_MODE: arena_worker
    env_file: [.env]
    depends_on:
      redis:     { condition: service_healthy }
      timescale: { condition: service_healthy }
      migrate:   { condition: service_completed_successfully }
      mlflow:    { condition: service_started }
    volumes:
      - ./models:/app/models:ro
      - ./artifacts:/app/artifacts
    networks: [lumina_net]

  # ----- Dashboard (Frontend) ---------------------------------------------
  dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: lumina_dashboard
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      api: { condition: service_started }
    networks: [lumina_net]

volumes:
  redis_data:
  timescale_data:
  mlflow_data:

networks:
  lumina_net:
    driver: bridge
