# pyproject.toml
# Lumina V3 — Python project metadata.
#
# Dependency layering
# -------------------
# We split deps into one minimal "core" set plus several extras so each
# Docker image can install only what it actually needs:
#
#     core         — shared runtime primitives — always present
#     [api]        — REST + WS server
#     [data]       — collectors + ingestion (yfinance, asyncpg, polars)
#     [perception] — torch + transformers + torch-geometric
#     [brain]      — perception + gymnasium + alpaca-py
#     [gpu]        — quantisation helpers (accelerate, bitsandbytes)
#     [dev]        — tests + lint + typing
#
# IMPORTANT: stable-baselines3 is intentionally NOT a dependency. Lumina
# V3 uses an in-house PPO implementation (backend/cognition/agent/ppo_agent.py)
# that supports our 4-D squashed-Gaussian action space, MC-Dropout
# uncertainty, and KL early-stop — features SB3 does not expose. Adding
# SB3 would create two divergent code paths for the same concern.

[project]
name = "lumina_v3"
version = "0.1.0"
description = "Lumina V3 — Chimera deep-fusion algorithmic trading system"
requires-python = ">=3.11"
